[package]
name = "compare-dir"
version = "0.2.0"
edition = "2024"
description = "A high-performance directory comparison tool and library"
authors = ["Koji Ishii <kojiishi@gmail.com>"]
license = "Apache-2.0"
repository = "https://github.com/kojiishi/compare-dir"
readme = "README.md"
keywords = ["directory", "comparison", "diff", "parallel"]
categories = ["command-line-utilities", "development-tools"]
exclude = [".github", ".gitignore", "hooks", ".vscode"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
rayon = "1.10"
walkdir = "2.5"
indicatif = "0.18"
anyhow = "1.0"
log = "0.4"
env_logger = "0.11"

[dev-dependencies]
tempfile = "3.10"
