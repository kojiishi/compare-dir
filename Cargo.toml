[package]
name = "compare-dir"
version = "0.1.0"
edition = "2024"
description = "A high-performance directory comparison tool and library"
license = "MIT"
repository = "https://github.com/kojiishi/compare-dir"
readme = "README.md"
keywords = ["directory", "comparison", "diff", "parallel"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
rayon = "1.10"
walkdir = "2.5"
indicatif = "0.18"
anyhow = "1.0"
log = "0.4"
env_logger = "0.11"

[[bin]]
name = "compare-dir"
path = "src/main.rs"

[lib]
name = "compare_dir"
path = "src/lib.rs"

[dev-dependencies]
tempfile = "3.10"
